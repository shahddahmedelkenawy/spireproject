<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spire Landing Page</title>

  <style>
    /* ================= GENERAL ================= */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    button {
      cursor: pointer;
      border: none;
      outline: none;
      font-family: inherit;
    }

    /* ================= HEADER ================= */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 80px;
      background: #ffffff;
    }

    .logo img {
      height: 35px;
    }

    .nav-links {
      display: flex;
      gap: 32px;
      font-weight: 700;
    }

    .nav-links a {
      color: #2a2a2a;
    }

    .nav-buttons {
      display: flex;
      gap: 12px;
    }

    .nav-btn {
      padding: 10px 24px;
      border-radius: 50px;
      background: #4b1f4f;
      color: white;
    }

    /* ================= HERO ================= */
    .hero {
      display: flex;
      align-items: center;
      gap: 80px;
      max-width: 1440px;
      margin: 0 auto;
      padding: 40px 80px;
    }

    .hero-image img {
      max-width: 420px;
      width: 100%;
    }

    .hero-content {
      flex: 1;
      text-align: center;
    }

    .hero-title img {
      max-width: 600px;
      width: 100%;
    }

    .hero-buttons {
      display: flex;
      gap: 24px;
      margin-top: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .main-btn {
      padding: 16px 36px;
      border-radius: 50px;
      background: #4b1f4f;
      color: white;
      font-size: 18px;
      transition: 0.3s;
    }

    .main-btn:hover {
      opacity: 0.85;
    }

    /* ================= STATS ================= */
    .stats-section {
      background-color: #3b154f;
      padding: 80px 50px;
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
    }

    .stat-card {
      width: 250px;
      height: 250px;
      border: 2px solid rgba(255,255,255,0.9);
      border-radius: 28px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: rgba(255,255,255,0.35);
    }

    .stat-number {
      font-size: 48px;
      font-weight: 600;
    }

    .stat-label {
      font-size: 28px;
      margin-top: 10px;
    }

    /* ================= RESPONSIVE ================= */
    @media (max-width: 1024px) {
      .hero {
        flex-direction: column;
      }
      .stats-section {
        flex-direction: column;
        align-items: center;
      }
    }

  </style>
</head>
<body>

  <!-- ========== NAVBAR ========== -->
  <header class="navbar">
    <div class="logo">
      <img src="logo.png" alt="Spire Logo">
    </div>

    <nav class="nav-links">
      <a href="#">Our Featured Companies</a>
      <a href="#">Our Featured Jobs</a>
      <a href="#">About Us</a>
      <a href="#">Contact Us</a>
    </nav>

    <div class="nav-buttons">
      <button class="nav-btn">Sign up</button>
      <button class="nav-btn">Login</button>
    </div>
  </header>

  <!-- ========== HERO SECTION ========== -->
  <section class="hero">
    <div class="hero-image">
      <img src="Group.png" alt="Illustration">
    </div>

    <div class="hero-content">
      <div class="hero-title">
        <img src="see-ability.png" alt="SEE ABILITY NOT DISABILITY">
      </div>

      <div class="hero-buttons">
        <button class="main-btn">Join as a Job Seeker →</button>
        <button class="main-btn">Join as an Employer →</button>
      </div>
    </div>
  </section>

  <!-- ========== STATS SECTION ========== -->
  <section class="stats-section">
    <div class="stat-card">
      <div class="stat-number">3+</div>
      <div class="stat-label">Years</div>
    </div>

    <div class="stat-card">
      <div class="stat-number">50,000+</div>
      <div class="stat-label">Users</div>
    </div>

    <div class="stat-card">
      <div class="stat-number">10,000+</div>
      <div class="stat-label">Companies</div>
    </div>
  </section>

</body>
</html>
